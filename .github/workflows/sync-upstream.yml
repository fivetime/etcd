name: Sync from Upstream

on:
  schedule:
    - cron: '0 4 * * 0'  # 每周日 UTC 4:00 自动执行
  workflow_dispatch:     # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/etcd-io/etcd.git

      - name: Fetch upstream (incl. all tags)
        run: git fetch --tags upstream

      - name: Merge upstream/main into main
        run: git merge --no-edit upstream/main

      - name: Set push URL to use token
        # SYNC_TOKEN（可选）：带 contents:write + workflows:write 的 fine-grained PAT。
        # GITHUB_TOKEN 无法推送包含 .github/workflows 变更的提交（GitHub 硬性限制，
        # permissions 块里也没有 workflows 可声明），而 etcd 上游 v3.5+ 的 tag 历史
        # 都包含 workflow 文件，因此没有 PAT 时这些 tag 推不上去。
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}@github.com/fivetime/etcd.git

      - name: Push to your repo
        run: |
          git push origin main
          # 只同步正式版 tag（vX.Y.Z）；忽略 alpha/beta/rc/_plus_git/+git 等预发布。
          # tag 推送允许失败：build-images 直接从上游 etcd-io/etcd 解析并检出
          # release tag，不依赖 fork 上的 tags。配置 SYNC_TOKEN 后此步才能完整成功。
          stable_tags=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed 's|^|refs/tags/|')
          git push origin $stable_tags || echo "::warning::tag push rejected — add a SYNC_TOKEN PAT (contents+workflows write) to sync tags whose history touches workflow files"
